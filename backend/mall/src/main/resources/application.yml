server:
  port: 8080

file:
  upload-dir: uploads

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  application:
    name: tyut-mall

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisConnectionAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.redis.RedisVectorStoreAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  sql:
    init:
      mode: always
      data-locations: classpath:db/data.sql
      continue-on-error: true

  devtools:
    restart:
      enabled: true

# JWT
jwt:
  secret: tyut-mall-secret-key-2026-very-long-secret-for-hs256
  expiration: 86400000

# 日志
logging:
  level:
    com.tyut.mall: debug
    org.hibernate.SQL: warn
